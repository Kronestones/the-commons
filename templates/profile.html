{% extends "base.html" %}
{% block title %}@{{ username }} — The Commons{% endblock %}

{% block content %}
<div class="profile-layout">

  <!-- Banner -->
  <div class="profile-banner" id="profile-banner" style="height:160px;background:var(--green-dark);border-radius:12px;margin-bottom:-40px;position:relative;overflow:hidden;">
    <img id="banner-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;">
    <label id="banner-upload-btn" style="display:none;position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.5);color:white;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;">
      📷 Edit Banner
      <input type="file" accept="image/*" style="display:none" onchange="uploadBanner(this)">
    </label>
  </div>

  <div class="profile-header" id="profile-header" style="position:relative;padding-top:20px;">
    <!-- Avatar -->
    <div style="position:relative;display:inline-block;">
      <div class="profile-avatar" id="profile-avatar" style="width:80px;height:80px;border-radius:50%;background:var(--green-mid);display:flex;align-items:center;justify-content:center;font-size:32px;color:white;border:3px solid white;overflow:hidden;"></div>
      <label id="avatar-upload-btn" style="display:none;position:absolute;bottom:0;right:0;background:var(--green-dark);color:white;width:24px;height:24px;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:12px;">
        📷
        <input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      </label>
    </div>
    <div class="profile-avatar" id="profile-avatar"></div>
    <div class="profile-info">
      <h1 class="profile-username" id="profile-username"></h1>
      <p class="profile-displayname" id="profile-displayname" style="display:none;"></p>
      <p class="profile-bio" id="profile-bio" style="display:none;"></p>
      <p class="profile-joined" id="profile-joined"></p>
      <div class="profile-stats" id="profile-stats"></div>
    </div>
    <div id="profile-actions"></div>
  </div>

  <div class="profile-composer post-composer" id="profile-composer" style="display:none;">
    <textarea id="compose-text" placeholder="Share something with The Commons..." rows="3" maxlength="10000"></textarea>
    <div class="composer-actions">
      <label class="attach-btn">
        📎 Attach
        <input type="file" id="compose-file" accept="image/*,video/*,audio/*" style="display:none" onchange="previewAttachment(this)">
      </label>
      <button class="btn-primary" onclick="submitPost()">Post</button>
    </div>
    <div id="attachment-preview" style="display:none;margin-top:8px;font-size:13px;color:var(--green-mid);"></div>
    <div id="compose-msg" class="composer-note" style="display:none;"></div>
  </div>

  <div class="profile-posts" id="profile-posts">
    <p class="empty-feed">Loading...</p>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const PAGE_USERNAME = {{ username | tojson }};
const currentUsername = localStorage.getItem('username') || '';
const isOwn = currentUsername === PAGE_USERNAME;

function getProfileToken() {
  try { return localStorage.getItem('token') || ''; } catch(e) { return ''; }
}

async function uploadAvatar(input) {
  if (!input.files[0]) return;
  const form = new FormData();
  form.append('media', input.files[0]);
  const res = await fetch('/api/profile/avatar', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + getProfileToken() }, body: form
  });
  const data = await res.json();
  if (data.ok) loadProfile();
  else showMessage(data.error || 'Upload failed', true);
}

async function uploadBanner(input) {
  if (!input.files[0]) return;
  const form = new FormData();
  form.append('media', input.files[0]);
  const res = await fetch('/api/profile/banner', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + getProfileToken() }, body: form
  });
  const data = await res.json();
  if (data.ok) loadProfile();
  else showMessage(data.error || 'Upload failed', true);
}

async function loadProfile() {
  const postsEl = document.getElementById('profile-posts');
  const token = getProfileToken();
  if (!token) {
    postsEl.innerHTML = '<p style="padding:20px;color:#c00;">No token — please sign in again.</p>';
    return;
  }
  try {
    const res = await fetch('/api/users/' + PAGE_USERNAME + '/profile', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      window.location.href = '/login';
      return;
    }
    const data = await res.json();
    if (!data.ok) {
      postsEl.innerHTML = '<p style="padding:20px;color:#c00;">' + (data.detail || data.error || 'Error loading profile') + '</p>';
      return;
    }
    const p = data.profile;
    const avatarEl = document.getElementById('profile-avatar');
    if (p.avatar_path) {
      avatarEl.innerHTML = '<img src="/media/' + p.avatar_path + '" style="width:100%;height:100%;object-fit:cover;">';
    } else {
      avatarEl.textContent = p.username[0].toUpperCase();
    }
    if (p.banner_path) {
      const bannerImg = document.getElementById('banner-img');
      bannerImg.src = '/media/' + p.banner_path;
      bannerImg.style.display = '';
    }
    if (isOwn) {
      document.getElementById('banner-upload-btn').style.display = '';
      const avatarUpload = document.getElementById('avatar-upload-btn');
      avatarUpload.style.display = 'flex';
    }
    document.getElementById('profile-username').textContent = '@' + p.username;
    if (p.display_name && p.display_name !== p.username) {
      const dn = document.getElementById('profile-displayname');
      dn.textContent = p.display_name;
      dn.style.display = '';
    }
    if (p.bio) {
      const bioEl = document.getElementById('profile-bio');
      bioEl.textContent = p.bio;
      bioEl.style.display = '';
    }
    document.getElementById('profile-joined').textContent = 'Member since ' + p.joined;
    document.getElementById('profile-stats').innerHTML =
      '<span>' + p.followers + ' followers</span> · ' +
      '<span>' + p.following + ' following</span> · ' +
      '<span>' + p.post_count + ' posts</span>';
    const actionsEl = document.getElementById('profile-actions');
    if (isOwn) {
      document.getElementById('profile-composer').style.display = '';
      actionsEl.innerHTML = '<a href="/profile/edit" class="btn-primary">Edit Profile</a>';
    } else if (token) {
      actionsEl.innerHTML = '<button onclick="toggleFollow()" class="btn-primary">' + (p.is_following ? 'Unfollow' : 'Follow') + '</button>';
    }
    if (!p.posts || p.posts.length === 0) {
      postsEl.innerHTML = '<p class="empty-feed">No posts yet.</p>';
      return;
    }
    postsEl.innerHTML = p.posts.map(post => `
      <div class="post-card" id="post-${post.id}">
        <div class="post-header">
          <span class="post-author">@${p.username}</span>
          <span class="post-time">${post.published_at ? new Date(post.published_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''}</span>
        </div>
        <div class="post-content">${post.content}</div>
        <div class="post-actions">
          <button onclick="vote(${post.id}, 1)" class="vote-btn">❤️</button>
          <span class="community-score">${Math.round(post.community_score)}</span>
          ${isOwn ? `<button onclick="deletePost(${post.id}, this)" class="delete-btn">Delete</button>` : ''}
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('profile-posts').innerHTML = '<p style="padding:20px;color:#c00;">Error: ' + e.message + '</p>';
  }
}

function previewAttachment(input) {
  const preview = document.getElementById('attachment-preview');
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => { preview.style.display = ''; preview.textContent = '📎 ' + input.files[0].name; };
    reader.readAsDataURL(input.files[0]);
  }
}

async function submitPost() {
  const content = document.getElementById('compose-text').value.trim();
  const msgEl = document.getElementById('compose-msg');
  const fileInput = document.getElementById('compose-file');
  const file = fileInput && fileInput.files[0];
  if (!content && !file) return;
  let post_type = 'text';
  if (file) {
    if (file.type.startsWith('image/')) post_type = 'image';
    else if (file.type.startsWith('video/')) post_type = 'video';
    else if (file.type.startsWith('audio/')) post_type = 'audio';
  }
  const form = new FormData();
  form.append('content', content);
  form.append('post_type', post_type);
  if (file) form.append('media', file);
  const res = await fetch('/api/posts', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + getProfileToken() },
    body: form
  });
  const data = await res.json();
  msgEl.style.display = '';
  if (data.ok) {
    msgEl.style.color = '#2e7d4f';
    msgEl.textContent = data.message || 'Posted!';
    document.getElementById('compose-text').value = '';
    setTimeout(() => loadProfile(), 800);
  } else {
    msgEl.style.color = '#c0392b';
    msgEl.textContent = data.error || 'Something went wrong.';
  }
}

async function toggleFollow() {
  const res = await fetch('/api/users/' + PAGE_USERNAME + '/follow', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + getProfileToken() }
  });
  const data = await res.json();
  if (data.ok) loadProfile();
}

async function deletePost(postId, btn) {
  if (!confirm('Delete this post?')) return;
  const res = await fetch('/api/posts/' + postId, {
    method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getProfileToken() }
  });
  const data = await res.json();
  if (data.ok) document.getElementById('post-' + postId).remove();
  else showMessage(data.error || 'Could not delete post.', true);
}

setTimeout(loadProfile, 150);
</script>
{% endblock %}
