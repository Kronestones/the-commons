<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The Commons</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Join The Commons</h1>
    <p class="auth-note">No phone number required. No biometrics. No password stored. Ever. Just your email.</p>
    

  <a href="https://buymeacoffee.com/sentinel.commons" target="_blank" style="display:inline-block; padding:0.6rem 1.5rem; background:#2a4ec8; color:#fff; border-radius:8px; text-decoration:none; font-weight:600; font-size:0.9rem;" class="download-btn" data-tah="true" data-member-url="https://buymeacoffee.com/sentinel.commons?amount=1" data-member-text="Download Tah — $1 (member)">Download Tah — $3</a>
</div>
<div class="auth-form">
        <div id="error-box" class="error-box" style="display:none;"></div>
        <div id="success-box" class="success-box" style="display:none;"></div>
        <label>Username</label>
        <small>Letters, numbers, underscores and hyphens only. No spaces. (3-50 characters)</small>
        <input type="text" id="username" placeholder="e.g. Krone or krone_1" required>
        <label>Email</label>
        <input type="email" id="email" placeholder="Email" required>
        <label>Display name (optional)</label>
        <input type="text" id="display_name" placeholder="How you want to appear to others">
        <button onclick="register()">Join The Commons</button>
        <p>Already have an account? <a href="/login">Sign in</a></p>
    </div>
    <script>
    async function register() {
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const display_name = document.getElementById('display_name').value;
        if (username.includes(' ')) {
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-box').innerText = 'Username cannot contain spaces. Try using an underscore instead, e.g. krone_1';
            return;
        }
        const body = new FormData();
        body.append('username', username);
        body.append('email', email);
        body.append('display_name', display_name);
        const res = await fetch('/auth/register', { method: 'POST', body });
        const data = await res.json();
        if (data.ok) {
            document.getElementById('success-box').style.display = 'block';
            document.getElementById('success-box').innerText = 'Welcome to The Commons! Your sign-in link is on its way. Gmail usually delivers in under a minute. Other providers may take 2-5 minutes. If you don\'t see it, check your spam folder — and mark us as safe so it never lands there again.';
            document.getElementById('error-box').style.display = 'none';
        } else {
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-box').innerText = data.error || 'Registration failed.';
            document.getElementById('success-box').style.display = 'none';
        }
    }
    </script>
<script>
if (localStorage.getItem('token')) {
  document.querySelectorAll('.download-btn').forEach(btn => {
    btn.href = btn.dataset.memberUrl;
    btn.textContent = btn.dataset.memberText;
  });
}
</script>
</body>
</html>
