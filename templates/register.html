<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The Commons</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Join The Commons</h1>
    <p class="auth-note">No phone number required. No biometrics. No password stored. Ever. Just your email.</p>
    <div class="auth-form">
        <div id="error-box" class="error-box" style="display:none;"></div>
        <div id="success-box" class="success-box" style="display:none;"></div>
        <label>Username</label>
        <input type="text" id="username" placeholder="Username" required>
        <label>Email</label>
        <input type="email" id="email" placeholder="Email" required>
        <label>Display name (optional)</label>
        <input type="text" id="display_name" placeholder="Display name">
        <button onclick="register()">Join The Commons</button>
        <p>Already have an account? <a href="/login">Sign in</a></p>
    </div>
    <script>
    async function register() {
        const body = new FormData();
        body.append('username', document.getElementById('username').value);
        body.append('email', document.getElementById('email').value);
        body.append('display_name', document.getElementById('display_name').value);
        const res = await fetch('/auth/register', { method: 'POST', body });
        const data = await res.json();
        if (data.ok) {
            document.getElementById('success-box').style.display = 'block';
            document.getElementById('success-box').innerText = 'Welcome! Check your email for your sign-in link.';
            document.getElementById('error-box').style.display = 'none';
        } else {
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-box').innerText = data.error || 'Registration failed.';
            document.getElementById('success-box').style.display = 'none';
        }
    }
    </script>
</body>
</html>
