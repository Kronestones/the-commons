{% extends "base.html" %}
{% block title %}Sign In — The Commons{% endblock %}
{% block nav_links %}
<a href="/codex">Guidelines</a>
{% endblock %}
{% block content %}

<div class="auth-container">
  <h1>Welcome back</h1>
  <p class="auth-note">Enter your username and password to sign in.</p>

  <form id="login-form" class="auth-form">
    <label>Username
      <input type="text" id="username" placeholder="your_username" required>
    </label>
    <label>Password
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Your password" required>
        <button type="button" class="show-password-btn" onclick="togglePassword('password', this)">Show</button>
      </div>
    </label>
    <div id="form-error" class="form-error" style="display:none"></div>
    <button type="submit" class="btn-primary btn-full">Sign In</button>
  </form>

  <p class="auth-switch">New here? <a href="/register"><strong>Join The Commons</strong></a></p>
</div>

{% endblock %}
{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = new FormData();
  form.append('username', document.getElementById('username').value);
  form.append('password', document.getElementById('password').value);
  const res  = await fetch('/auth/login', { method: 'POST', body: form });
  const data = await res.json();
  if (data.ok) {
    localStorage.setItem('token',    data.token);
    localStorage.setItem('username', data.user.username);
    window.location = '/';
  } else {
    const err = document.getElementById('form-error');
    err.textContent   = data.error;
    err.style.display = 'block';
  }
});
</script>
{% endblock %}
