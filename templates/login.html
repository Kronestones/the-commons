{% extends "base.html" %}
{% block title %}Sign In — The Commons{% endblock %}
{% block content %}
<div class="auth-container">
  <h1>Welcome back</h1>
  <p class="auth-note">Enter your email and we'll send you a sign-in link. No password needed. Ever.</p>

  <div class="auth-form">
    <div id="error-box" class="form-error" style="display:none;"></div>
    <div id="success-box" class="form-error" style="display:none; background:#eaf4ee; border-color: var(--green-mid); color: var(--green-dark);"></div>

    <label>
      Email
      <input type="email" id="email" placeholder="Your email" required>
    </label>

    <button onclick="requestLink()" class="btn-primary btn-full">Send Sign-In Link</button>
    <p class="auth-switch">New here? <a href="/register">Join The Commons</a></p>
  </div>
</div>

<script>
async function requestLink() {
  const body = new FormData();
  body.append('email', document.getElementById('email').value);
  const res = await fetch('/auth/magic/request', { method: 'POST', body });
  const data = await res.json();
  if (data.ok) {
    document.getElementById('success-box').style.display = 'block';
    document.getElementById('success-box').innerText = 'Your sign-in link is on its way! Gmail usually delivers in under a minute. Check your spam folder if you don\'t see it.';
    document.getElementById('error-box').style.display = 'none';
  } else {
    document.getElementById('error-box').style.display = 'block';
    document.getElementById('error-box').innerText = data.error || 'Something went wrong.';
    document.getElementById('success-box').style.display = 'none';
  }
}
</script>
{% endblock %}
