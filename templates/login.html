<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — The Commons</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Welcome back</h1>
    <p class="auth-note">Enter your email and we'll send you a sign-in link. No password needed. Ever.</p>
    <div class="auth-form">
        <div id="error-box" class="error-box" style="display:none;"></div>
        <div id="success-box" class="success-box" style="display:none;"></div>
        <label>Email</label>
        <input type="email" id="email" placeholder="Your email" required>
        <button onclick="requestLink()">Send Sign-In Link</button>
        <p>New here? <a href="/register">Join The Commons</a></p>
    </div>
    <script>
    async function requestLink() {
        const body = new FormData();
        body.append('email', document.getElementById('email').value);
        const res = await fetch('/auth/magic/request', { method: 'POST', body });
        const data = await res.json();
        if (data.ok) {
            document.getElementById('success-box').style.display = 'block';
            document.getElementById('success-box').innerText = 'Your sign-in link is on its way! Gmail usually delivers in under a minute. Check your spam folder if you don\'t see it.';
            document.getElementById('error-box').style.display = 'none';
        } else {
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('error-box').innerText = data.error || 'Something went wrong.';
            document.getElementById('success-box').style.display = 'none';
        }
    }
    </script>
</body>
</html>
